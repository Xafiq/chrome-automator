        certificate:
          es: "Certificado Oficial de Finalización de 4Geeks, reconocido por múltiples instituciones. Puedes elegir entre inglés y español para el plan de estudios y el contenido. Las clases en vivo se imparten en el idioma de tu campus."
          en: "Official 4Geeks Completion Certificate, recognized by multiple institutions. You can choose between English and Spanish for the curriculum and content. Live classes are taught in the language of your campus."
    - name:
        es: "Full Stack Bootcamp"
        en: "Full Stack Bootcamp"
      desc:
        es: "Un programa avanzado en línea de tiempo parcial de 16 semanas que requiere al menos un año de experiencia previa en desarrollo de software. Se enfoca en conceptos avanzados de ingeniería de software y calidad de proyectos."
        en: "An advanced online part-time program of 16 weeks that requires at least one year of prior software development experience. Focuses on advanced software engineering concepts and project quality."
      details:

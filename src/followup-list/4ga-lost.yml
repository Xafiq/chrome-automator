  career_support:
    description:
      es: "Apoyo profesional de por vida (GeekForce), incluyendo coaching personalizado, optimización de currículum y perfil de LinkedIn (compatible con ATS), preparación de entrevistas personalizada para ofertas de trabajo específicas y asistencia en redes. Conecta a los estudiantes con una extensa red de más de 5,000 socios contratantes. Altas tasas de colocación laboral (reportadas entre 84% y 93% dentro de los 90-270 días después de la graduación)."
      en: "Lifetime professional support (GeekForce), including personalized coaching, resume and LinkedIn profile optimization (ATS-compatible), customized interview preparation for specific job offers, and networking assistance. Connects students with an extensive network of over 5,000 hiring partners. High job placement rates (reported between 84% and 93% within 90-270 days after graduation)."

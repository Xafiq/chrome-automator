description: Follow-up list for 4GA lost customers

agent:
  name: Flor
  tasks:
    # Tasks that run on any system
    - task: "Open WhatsApp at https://web.whatsapp.com/send/?phone={{contact.phone}}&text&type=phone_number&app_absent=0 and wait for the website home page to fully load."
    - task: "After the loading is over, you should see either a not found message or a new conversation on the right side of the screen with the number of the contact on the top of the conversation and one input to write a message at the bottom of the conversation."
    - task: "If the number is not found, or is invalid, stop because the user does not have WhatsApp installed for that number."
    - task: "The cursor should be already placed on the input at the bottom of the conversation, ready to start typing a message, if not, click on the input to place the cursor."
    - task: "Compose a new message like this but make sure only the first name of the contact is used, ignore the last name: '{{get_message('greeting', contact, agent.name)}}' and send the message."
    - task: "After sending the previous one, compose a new message: '{{get_message('subscription_offer', contact, agent.name)}}' and send the message."
    - task: "Wait for a response from the contact. If the contact responds positively, proceed to send the next message: '{{get_message('self_paced_benefits', contact, agent.name)}}'."
    - task: "If the contact expresses concerns or hesitation, send the following message: '{{get_message('empathy', contact, agent.name)}}'."
    - task: "Follow up with a message offering solutions: '{{get_message('solution', contact, agent.name)}}'."
    - task: "Encourage the contact with the following message: '{{get_message('encouragement', contact, agent.name)}}'."
    - task: "End with a call to action: '{{get_message('cta', contact, agent.name)}}'."

messages:
  greeting:
    es: "Hola {name}, ¿cómo estás? Soy {agent_name} de 4geeks."
    en: "Hi {name}, how are you? I'm {agent_name} from 4geeks."
  subscription_offer:
    es: "Quería contarte sobre nuestra modalidad de suscripción (anual o mensual), que te da acceso a 4 cursos para aprender a tu propio ritmo: Full Stack, Data Science, Python, Vibe Coding with AI. Es una excelente opción si buscas flexibilidad y quieres formarte en tecnología con contenidos de calidad. ¿Te gustaría que te comparta más información?"
    en: "I wanted to tell you about our subscription model (annual or monthly), which gives you access to 4 courses to learn at your own pace: Full Stack, Data Science, Python, Vibe Coding with AI. It's an excellent option if you're looking for flexibility and want to learn technology with quality content. Would you like me to share more information?"
  self_paced_benefits:
    es: "Nuestros cursos autodirigidos están diseñados para adaptarse a tu horario y necesidades específicas. Con acceso a mentoría ilimitada 1:1, soporte comunitario vibrante y aprendizaje basado en proyectos, podrás adquirir habilidades cruciales y construir un portafolio sólido sin interrumpir tu vida actual. Además, ofrecemos una garantía de empleo para muchos de nuestros programas, demostrando nuestra confianza en tu éxito."
    en: "Our self-paced courses are designed to fit your schedule and specific needs. With access to unlimited 1:1 mentoring, vibrant community support, and project-based learning, you can acquire crucial skills and build a strong portfolio without disrupting your current life. Plus, we offer a job guarantee for many of our programs, demonstrating our confidence in your success."
  empathy:
    es: "Entiendo lo ocupado que puede estar la vida. Muchos estudiantes tienen preocupaciones similares y es normal sentirse inseguro al comenzar algo nuevo. Te escucho; equilibrar compromisos con aspiraciones profesionales puede ser un desafío, pero estamos aquí para apoyarte en cada paso del camino."
    en: "I understand how busy life can get. Many students have similar concerns, and it's normal to feel unsure when starting something new. I hear you; balancing commitments with career aspirations can be challenging, but we are here to support you every step of the way."
  solution:
    es: "Ofrecemos opciones flexibles y autodirigidas para que puedas aprender a tu propio ritmo. Nuestra plataforma impulsada por IA y la mentoría humana ilimitada aseguran que nunca te quedes atascado. Puedes adquirir habilidades cruciales y construir un portafolio sin interrumpir tu vida actual. Además, nuestra comunidad de apoyo y mentores están siempre disponibles para ayudarte a superar cualquier obstáculo."
    en: "We offer flexible and self-directed options so you can learn at your own pace. Our AI-driven platform and unlimited human mentoring ensure you never get stuck. You can acquire crucial skills and build a portfolio without disrupting your current life. Plus, our supportive community and mentors are always available to help you overcome any obstacles."
  encouragement:
    es: "Definitivamente puedes lograr tus objetivos tecnológicos con el apoyo adecuado. Tu impulso por aprender es el factor más importante, y nosotros proporcionamos las herramientas para hacerlo realidad. Cada pequeño paso que des te acercará más a tus metas y sueños. Recuerda que cada experto fue alguna vez un principiante, y tú también puedes lograrlo."
    en: "You can definitely achieve your tech goals with the right support. Your drive to learn is the most important factor, and we provide the tools to make it happen. Every small step you take will bring you closer to your goals and dreams. Remember that every expert was once a beginner, and you can do it too."
  cta:
    es: "¿Te gustaría más información sobre nuestro 'Solo Bootcamp' autodirigido? ¿Puedo conectarte con un asesor para una llamada rápida y explorar qué opción flexible se ajusta mejor a tus necesidades? ¿Qué tal si te inscribimos en el trabajo previo gratuito 'Start Coding' para que puedas experimentar LearnPack en primera persona?"
    en: "Would you like more information about our self-directed 'Solo Bootcamp'? Can I connect you with an advisor for a quick call to explore which flexible option best fits your needs? How about we sign you up for the free 'Start Coding' pre-work so you can experience LearnPack firsthand?"
  about:
    general:
      es: "4Geeks Academy es un bootcamp de codificación global que ayuda a los estudiantes a transicionar a carreras tecnológicas. Fundada en 2015, ofrece programas inmersivos y flexibles, fuerte apoyo profesional y un plan de estudios práctico basado en proyectos. Reconocida por Forbes, Newsweek y SwitchUp como un bootcamp de codificación líder, y licenciada por el Departamento de Educación de Florida, EE.UU."
      en: "4Geeks Academy is a global coding bootcamp that helps students transition to tech careers. Founded in 2015, it offers immersive and flexible programs, strong professional support, and a practical, project-based curriculum. Recognized by Forbes, Newsweek, and SwitchUp as a leading coding bootcamp, and licensed by the Florida Department of Education, USA."
    community:
      es: "Únete a nuestra comunidad internacional de más de 4000 estudiantes, profesores, socios y alumnos. Conéctate a través de varios canales como Slack, GitHub, redes sociales y nuestra plataforma exclusiva 4Geeks.com. Donde hay un geek, hay un camino."
      en: "Join our international community of over 4,000 students, teachers, partners, and alumni. Connect through various channels like Slack, GitHub, social networks, and our exclusive platform 4Geeks.com. Where there is a geek, there is a way."
  programs:
    - name:
        es: "Full Stack Coding Bootcamp"
        en: "Full Stack Coding Bootcamp"
      desc:
        es: "Programa insignia que enseña Python, React y JavaScript para el desarrollo full-stack. Amigable para principiantes, disponible a tiempo completo (9 semanas), tiempo parcial (16-18 semanas) y autoaprendizaje (Solo Bootcamp). Se enfoca en la construcción de aplicaciones web del mundo real."
        en: "Flagship program teaching Python, React, and JavaScript for full-stack development. Beginner-friendly, available full-time (9 weeks), part-time (16-18 weeks), and self-paced (Solo Bootcamp). Focuses on building real-world web applications."
      details:
        duration:
          full_time:
            es: "9 semanas"
            en: "9 weeks"
          part_time:
            es: "16-18 semanas"
            en: "16-18 weeks"
          self_paced:
            es: "Flexible"
            en: "Flexible"
        languages: ["Python", "React", "JavaScript"]
        focus:
          es: "Aplicaciones web del mundo real"
          en: "Real-world web applications"
        certificate:
          es: "Certificado Oficial de Finalización de 4Geeks, reconocido por múltiples instituciones. Puedes elegir entre inglés y español para el plan de estudios y el contenido. Las clases en vivo se imparten en el idioma de tu campus."
          en: "Official 4Geeks Completion Certificate, recognized by multiple institutions. You can choose between English and Spanish for the curriculum and content. Live classes are taught in the language of your campus."
    - name:
        es: "Data Science and Machine Learning Bootcamp"
        en: "Data Science and Machine Learning Bootcamp"
      desc:
        es: "Se enfoca en Python para la recolección de datos, gestión, creación de modelos y resolución de problemas con Machine Learning, Deep Learning y AI. Disponible a tiempo completo, tiempo parcial y autoaprendizaje."
        en: "Focuses on Python for data collection, management, model building, and problem-solving with Machine Learning, Deep Learning, and AI. Available full-time, part-time, and self-paced."
      details:
        duration:
          full_time:
            es: "16 semanas"
            en: "16 weeks"

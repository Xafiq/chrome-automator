          en: "Official 4Geeks Completion Certificate, recognized by multiple institutions. You can choose between English and Spanish for the curriculum and content. Live classes are taught in the language of your campus."
    - name:
        es: "Cybersecurity Bootcamp"
        en: "Cybersecurity Bootcamp"
      desc:
        es: "Nuestros bootcamp te ayuda a aprender todo lo necesario para empezar en el mundo de la ciberseguridad, enfocándose en identificar, gestionar y mitigar vulnerabilidades del sistema en cumplimiento con ISO y otros estándares. Disponible a tiempo completo, tiempo parcial y autoaprendizaje."
        en: "Our bootcamp helps you learn everything you need to start in the world of cybersecurity, focusing on identifying, managing, and mitigating system vulnerabilities in compliance with ISO and other standards. Available full-time, part-time, and self-paced."
      details:
        duration:
          full_time:
            es: "16 semanas"
            en: "16 weeks"
          part_time:
            es: "24 semanas"
            en: "24 weeks"
          self_paced:
            es: "Flexible"
            en: "Flexible"
        focus:
          es: "Identificación y gestión de vulnerabilidades, cumplimiento con ISO"
          en: "Identification and management of vulnerabilities, compliance with ISO"
        certificate:
          es: "Certificado Oficial de Finalización de 4Geeks, reconocido por múltiples instituciones. Puedes elegir entre inglés y español para el plan de estudios y el contenido. Las clases en vivo se imparten en el idioma de tu campus. Además, se ofrece acceso a exámenes de Cisco para certificaciones de ciberseguridad como 'CEH' (Ethical Hacker) y 'CCST' (Cisco Certified Support Technician)."
          en: "Official 4Geeks Completion Certificate, recognized by multiple institutions. You can choose between English and Spanish for the curriculum and content. Live classes are taught in the language of your campus. Additionally, access to Cisco exams for cybersecurity certifications such as 'CEH' (Ethical Hacker) and 'CCST' (Cisco Certified Support Technician) is offered."
    - name:
        es: "Applied AI (No Code)"
        en: "Applied AI (No Code)"
      desc:
        es: "Un curso de 6 semanas diseñado para profesionales que desean aprovechar la IA generativa (ChatGPT, Claude, Llama3, Stable Diffusion, DALL-E, Midjourney) para la productividad y el crecimiento profesional, sin necesidad de experiencia previa en codificación. Incluye 2 clases en línea en vivo por semana (máx. 12 personas) y mentoría 1:1."
        en: "A 6-week course designed for professionals who want to leverage generative AI (ChatGPT, Claude, Llama3, Stable Diffusion, DALL-E, Midjourney) for productivity and professional growth, with no prior coding experience required. Includes 2 live online classes per week (max. 12 people) and 1:1 mentoring."
      details:
        duration:

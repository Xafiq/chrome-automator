          en: "Official 4Geeks Completion Certificate, recognized by multiple institutions. You can choose between English and Spanish for the curriculum and content. Live classes are taught in the language of your campus."
  methodology:
    description:
      es: "Aula invertida: la teoría (videos, animaciones, infografías) se entrega fuera de clase, el tiempo de clase (virtual o presencial) se dedica a debates, construcción de proyectos y mentoría directa. Hace hincapié en una baja ratio mentor-estudiante (1:7 en promedio), mentoría ilimitada 1:1 (sesiones de 45 minutos), asistencia de codificación impulsada por IA (Rigobot) y aprendizaje práctico basado en proyectos. Los estudiantes construyen aplicaciones completas, sin exámenes tradicionales."
      en: "Flipped classroom: theory (videos, animations, infographics) is delivered outside of class, class time (virtual or in-person) is dedicated to debates, project building, and direct mentoring. Emphasizes a low mentor-student ratio (1:7 on average), unlimited 1:1 mentoring (45-minute sessions), AI-driven coding assistance (Rigobot), and project-based practical learning. Students build complete applications, with no traditional exams."
